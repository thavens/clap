# Staged SDPO validation on two RunPod H100s.
#
# Full run (provisions, installs, runs every stage):
#   sky launch -c clap-sdpo-test examples/injecagent/sky_sdpo_test.yaml \
#     --secret WANDB_API_KEY --secret HF_TOKEN
#
# Re-run selected stages on an existing cluster (re-syncs the workdir, skips `setup`):
#   sky exec clap-sdpo-test examples/injecagent/sky_sdpo_test.yaml --env SDPO_STAGES=G \
#     --secret WANDB_API_KEY --secret HF_TOKEN
#
# Stages: (A) SDPO unit tests, (B) real 2-GPU vocab-parallel top-k + reverse-KL kernel,
# (C) config compose + loss-selection, (G) the pure-SDPO exclamation-marks run -- reference-matched
# and env-parameterized. A-C abort on failure; G is captured even on failure so the error is
# available for iteration. SDPO_STAGES selects which run. No remaining stage calls the hosted
# defender, so none needs OPENAI_API_KEY -- G's reward is a local string predicate (exclaim.py)
# that costs nothing per step.
#
# G is NOT in the default set because it is a multi-step training run, not because it is expensive.
# It is the stage that answers "does SDPO actually move the policy?" -- run it after any change to
# the objective, the reprompt path or the top-k transport:
#   sky exec clap-sdpo-test examples/injecagent/sky_sdpo_test.yaml --env SDPO_STAGES=G \
#     --secret WANDB_API_KEY --secret HF_TOKEN

resources:
  infra: runpod
  accelerators: H100-SXM:2

num_nodes: 1

workdir: .

envs:
  SDPO_STAGES: ABC

secrets:
  WANDB_API_KEY: ""
  HF_TOKEN: ""

setup: |
  set -euo pipefail

  export DEBIAN_FRONTEND=noninteractive
  SUDO=""
  [ "$(id -u)" -eq 0 ] || SUDO=sudo
  export CUDA_HOME=/usr/local/cuda-13.0
  export PATH="$CUDA_HOME/bin:$HOME/.local/bin:$PATH"

  if ! command -v nvcc >/dev/null 2>&1; then
    if ! ls /etc/apt/sources.list.d 2>/dev/null | grep -qi cuda; then
      . /etc/os-release
      wget -qO /tmp/cuda-keyring.deb \
        "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${VERSION_ID//./}/x86_64/cuda-keyring_1.1-1_all.deb"
      $SUDO dpkg -i /tmp/cuda-keyring.deb
    fi
    $SUDO apt-get update -y
    $SUDO apt-get install -y \
      build-essential cuda-toolkit-13-0 cudnn9-cuda-13 libcudnn9-dev-cuda-13 \
      libnccl2 libnccl-dev git wget curl
  fi
  nvcc --version
  nvidia-smi

  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  cd ~/sky_workdir
  [ -d .venv ] || uv venv --python 3.12 --seed
  source .venv/bin/activate

  uv pip install "vllm==0.25.1" "transformers==5.14.1" "openai>=2.46" wandb "TransferQueue==0.1.8"
  uv pip install -e . --no-build-isolation
  uv pip install ninja pybind11 einops cmake flash-linear-attention pytest

  if ! python -c "import transformer_engine.pytorch" 2>/dev/null; then
    uv pip install --no-build-isolation "transformer-engine[pytorch]==2.17.0"
  fi
  if ! python -c "import megatron.core" 2>/dev/null; then
    uv pip install --no-deps \
      "git+https://github.com/NVIDIA/Megatron-LM.git@core_v0.18.0"
  fi
  uv pip install -U "git+https://github.com/ISEEKYAN/mbridge.git@main"
  uv pip install "nvidia-modelopt[torch]>=0.37.0"
  uv pip install --no-deps "megatron-bridge==0.5.0"
  # Restore the versions used for Qwen3.5 after optional packages resolve their dependencies.
  uv pip install "transformers==5.14.1" "openai>=2.46"
  python examples/injecagent/patch_megatron_bridge.py

  python -c "import megatron.core, transformer_engine.pytorch, transformers, vllm; print('vllm', vllm.__version__, '| transformers', transformers.__version__, '| Megatron and TE ok')"

  # Blackwell-only: give TransformerEngine a FlashAttention backend. TE 2.17 ships NO fused/flash
  # attention path for sm_120 (RTX PRO 6000 / RTX 5090), so THD-packed + sliding-window attention
  # falls back to the unfused DPA path and dies in get_full_mask (RuntimeError: size of tensor a
  # (packed seqlen) must match b (micro-batch) at dim 2) -- this crashes BOTH the student and the
  # co-located SDPO teacher forward. Dao flash-attn 2.8.3 is exactly TE 2.17's MAX supported FA2
  # version; the cu13/torch2.11/cp312 wheel (fetched on the node, not synced) handles varlen
  # (cu_seqlens) + sliding window, so TE picks it and never calls get_full_mask. Hopper (H100, sm_90)
  # already has TE's built-in fused attention and needs none of this, so gate on the GPU arch:
  # Blackwell == compute-capability major >= 10 (H100=9.0, Ada=8.9, Ampere=8.0 all skip).
  CC="$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader 2>/dev/null | head -1 | tr -d ' ' || true)"
  CC_MAJOR="${CC%%.*}"
  echo "GPU compute capability: '${CC:-unknown}' (major '${CC_MAJOR:-?}')"
  if [ "${CC_MAJOR:-0}" -ge 10 ] 2>/dev/null; then
    echo "Blackwell GPU detected -> installing Dao flash-attn 2.8.3 (TE FlashAttention backend)"
    uv pip install \
      "https://github.com/adithyaxx/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3+cu13torch2.11cxx11abiTRUE-cp312-cp312-linux_x86_64.whl"
    python -c "import flash_attn; print('flash_attn', flash_attn.__version__, 'ready for TE')"

    # fla 0.5.1 (latest release) autotunes the gated-delta-rule BACKWARD with configs that emit a
    # CUDA "misaligned address" on sm_120 (tighter ~99KB shared mem + SM80-era MMA than the sm_80/90
    # the configs assume) -- it faults in prepare_wy_repr_bwd_kernel during Triton do_bench. fla main
    # commit ac6c648 "Restrict Blackwell gated delta bwd autotune" (2026-07-02, POST-0.5.1) prunes
    # those configs, so upgrade fla to main on Blackwell only (H100 keeps the validated 0.5.1). Pure
    # Python (Triton kernels JIT at runtime) so no build; --no-deps so the git version can't pull a
    # transformers/torch that breaks megatron-bridge (deps already satisfied by the base install).
    uv pip install --upgrade --no-deps \
      "flash-linear-attention @ git+https://github.com/fla-org/flash-linear-attention.git@main"
    python -c "import fla; print('fla', getattr(fla, '__version__', '?'), 'from main (Blackwell GDN bwd autotune fix)')"
  else
    echo "Non-Blackwell GPU (cc '${CC:-unknown}') -> skipping flash-attn wheel + fla-main (TE fused attention + fla 0.5.1 already work)"
  fi

  # Default training model for Stage G: the instruct model follows the in-context exclaim
  # feedback, which the base model does not.
  hf download Qwen/Qwen3.5-4B --local-dir "$HOME/models/Qwen3.5-4B"
  # Base model kept as the negative-control override (Stage G with SDPO_MODEL_NAME=Qwen3.5-4B-Base).
  hf download Qwen/Qwen3.5-4B-Base --local-dir "$HOME/models/Qwen3.5-4B-Base"
  python examples/data_preprocess/injecagent.py --output-dir "$HOME/data/injecagent"

run: |
  set -uo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  export CUDA_HOME=/usr/local/cuda-13.0
  export PATH="$CUDA_HOME/bin:$PATH"
  export CUDA_VISIBLE_DEVICES=0,1
  export MAX_JOBS=4
  export NVCC_THREADS=2
  export TORCHINDUCTOR_COMPILE_THREADS=8
  export OMP_NUM_THREADS=16
  export VLLM_USE_DEEP_GEMM=0
  export RAY_memory_usage_threshold=0.98
  # NOTE: do NOT set PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True here -- it is incompatible
  # with vLLM's cumem (cuMemCreate/Map) sleep/wake allocator used for colocated offload and makes
  # the rollout workers OOM at init. Control SDPO update memory via ppo_micro_batch_size instead.
  unset RAY_ADDRESS || true

  cd ~/sky_workdir
  source .venv/bin/activate

  echo "SDPO_STAGES=$SDPO_STAGES"

  if [[ "$SDPO_STAGES" == *A* ]]; then
    echo "=================== STAGE A: SDPO unit tests (CPU numerics + alignment) ==================="
    python -m pytest -q \
      tests/trainer/distillation/ \
      tests/trainer/ppo/test_sdpo_alignment_on_cpu.py || { echo "STAGE A FAILED"; exit 1; }
    echo "STAGE A PASSED"
  fi

  if [[ "$SDPO_STAGES" == *B* ]]; then
    echo "=================== STAGE B: real 2-GPU vocab-parallel full-vocab KL kernel ==================="
    torchrun --standalone --nproc_per_node=2 \
      tests/special_standalone/test_sdpo_full_kl_dist.py || { echo "STAGE B FAILED (full-kl)"; exit 1; }
    echo "STAGE B PASSED"
  fi

  if [[ "$SDPO_STAGES" == *C* ]]; then
    echo "=================== STAGE C: SDPO config compose + loss selection ==================="
    python - <<'PY' || { echo "STAGE C FAILED"; exit 1; }
  from hydra import compose, initialize_config_dir
  from verl.utils.config import omega_conf_to_dataclass
  from verl.trainer.distillation.losses import get_distillation_loss_fn
  import os
  cfgdir = os.path.join(os.getcwd(), "verl/trainer/config")
  with initialize_config_dir(config_dir=cfgdir, version_base=None):
      cfg = compose(config_name="ppo_trainer", overrides=[
          "sdpo.enabled=true", "sdpo.distillation_loss.use_task_rewards=false"])
  sd = omega_conf_to_dataclass(cfg.sdpo)
  assert sd.enabled and sd.alpha == 0.0 and sd.distillation_loss.loss_settings.use_full_kl
  assert get_distillation_loss_fn("self_distill_full_kl").__name__ == "compute_self_distill_full_kl_metric"
  print("STAGE C PASSED: SelfDistillationConfig + loss registry OK")
  PY
  fi

  if [[ "$SDPO_STAGES" == *G* ]]; then
    # PURE-SDPO reference-matched hyperparameter run. The exclaim SDPO launcher already sets
    # use_task_rewards=false / use_policy_gradient=false, so the loss is driven ENTIRELY by the
    # self-teacher divergence -- this stage exists to find hyperparameters that make that pure
    # objective converge instead of collapse, mirroring the reference SDPO repo's stable config
    # (/scr1/michael/SDPO: lr=1e-5, lr_warmup_steps=10, success_reward_threshold=0.5). The
    # reference's EMA teacher and the interpolating trust-region blend (lerp(ref, student, c))
    # are NOT reachable here (stubbed NotImplementedError in this port). The mix_coef->0 limit of
    # the trust-region teacher IS reachable, though: sdpo.teacher_use_base_model runs the teacher
    # forward with the LoRA adapter disabled, so the teacher is the frozen base = the reference
    # (the base weights never train). SDPO_BASE_TEACHER=true toggles it -- a frozen-reference-
    # anchored teacher in place of the default live self-teacher (base+adapter given feedback).
    # is_clip=2.0 stays out of reach either way. So this stage isolates whether lr + warmup + threshold
    # (+ optionally a frozen-reference teacher) are enough. Parameterized by env vars so each run
    # is a one-line `sky exec --env`.
    : "${SDPO_LR:=1e-5}"
    : "${SDPO_WARMUP:=10}"
    : "${SDPO_THRESHOLD:=0.5}"
    : "${SDPO_STEPS:=40}"
    : "${SDPO_ALPHA:=0.0}"     # 0 = forward KL (mass-covering), 1 = reverse KL (mode-seeking)
    : "${SDPO_ISCLIP:=null}"   # per-token IS-ratio cap, e.g. 2.0; null disables
    : "${SDPO_BASE_TEACHER:=false}"   # true = frozen base (LoRA disabled) as teacher = the reference (mix_coef->0 trust-region)
    : "${SDPO_TAG:=ref}"
    # Model / reasoning / context. Default is the 4B instruct model at 1024 ctx with reasoning off
    # -- the launcher documents this as the correct exclaim config, since the exclaim reward scores
    # only the post-</think> answer and thinking would just flood it with period-ended sentences.
    # A base model follows the in-context exclaim feedback too weakly to teach it by distillation,
    # so SDPO_MODEL_NAME=Qwen3.5-4B-Base is the negative-control override. The teacher-signal
    # reasoning variant additionally sets SDPO_THINKING=True and larger SDPO_RESP_LEN/SDPO_MODEL_LEN.
    # Select by model dir name (under $HOME/models, downloaded in setup); $HOME expands in-box.
    : "${SDPO_MODEL_NAME:=Qwen3.5-4B}"
    SDPO_MODEL="$HOME/models/$SDPO_MODEL_NAME"
    : "${SDPO_THINKING:=False}"
    : "${SDPO_RESP_LEN:=1024}"
    : "${SDPO_PROMPT_LEN:=1024}"
    : "${SDPO_MODEL_LEN:=1024}"          # must be >= prompt + response
    : "${SDPO_REPROMPT_LEN:=2048}"
    : "${SDPO_MAXSEQS:=128}"
    : "${SDPO_MAXTOK:=32768}"
    : "${SDPO_CUDAGRAPH:=[1,2,4,8,16,32,64,128]}"   # every size must be <= SDPO_MAXSEQS
    echo "=================== STAGE G: pure-SDPO (model=$SDPO_MODEL thinking=$SDPO_THINKING resp=$SDPO_RESP_LEN lr=$SDPO_LR alpha=$SDPO_ALPHA is_clip=$SDPO_ISCLIP base_teacher=$SDPO_BASE_TEACHER steps=$SDPO_STEPS tag=$SDPO_TAG) ==================="
    MODEL_PATH="$SDPO_MODEL" \
      examples/injecagent/run_qwen3_5_4b_megatron_sdpo_exclaim.sh \
        actor_rollout_ref.actor.optim.lr="$SDPO_LR" \
        actor_rollout_ref.actor.optim.lr_warmup_steps="$SDPO_WARMUP" \
        sdpo.success_reward_threshold="$SDPO_THRESHOLD" \
        sdpo.alpha="$SDPO_ALPHA" \
        sdpo.is_clip="$SDPO_ISCLIP" \
        sdpo.teacher_use_base_model="$SDPO_BASE_TEACHER" \
        sdpo.max_reprompt_len="$SDPO_REPROMPT_LEN" \
        sdpo.remove_thinking_from_demonstration=True \
        data.max_prompt_length="$SDPO_PROMPT_LEN" \
        data.max_response_length="$SDPO_RESP_LEN" \
        ++data.apply_chat_template_kwargs.enable_thinking="$SDPO_THINKING" \
        actor_rollout_ref.actor.ppo_max_token_len_per_gpu="$SDPO_MODEL_LEN" \
        actor_rollout_ref.rollout.max_model_len="$SDPO_MODEL_LEN" \
        actor_rollout_ref.rollout.log_prob_max_token_len_per_gpu="$SDPO_MODEL_LEN" \
        actor_rollout_ref.rollout.gpu_memory_utilization="${SDPO_GPUMEM:-0.6}" \
        actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu="${SDPO_PPOMBS:-4}" \
        actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu="${SDPO_LOGPROBMBS:-4}" \
        actor_rollout_ref.actor.megatron.param_offload="${SDPO_OFFLOAD:-true}" \
        actor_rollout_ref.actor.megatron.optimizer_offload="${SDPO_OFFLOAD:-true}" \
        actor_rollout_ref.actor.megatron.grad_offload="${SDPO_OFFLOAD:-true}" \
        actor_rollout_ref.rollout.max_num_seqs="$SDPO_MAXSEQS" \
        actor_rollout_ref.rollout.max_num_batched_tokens="$SDPO_MAXTOK" \
        actor_rollout_ref.rollout.cudagraph_capture_sizes="$SDPO_CUDAGRAPH" \
        trainer.total_training_steps="$SDPO_STEPS" \
        trainer.experiment_name="exclaim_sdpo_refhp_${SDPO_TAG}" \
        2>&1 | tee "$HOME/exclaim_sdpo_refhp_${SDPO_TAG}.log"
    RC=${PIPESTATUS[0]}
    echo "STAGE G ($SDPO_TAG) exit code: $RC"
    python examples/injecagent/parse_exclaim_curves.py "$HOME/exclaim_sdpo_refhp_${SDPO_TAG}.log" || true
    exit $RC
  fi
